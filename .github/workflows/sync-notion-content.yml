name: Sync website content from Notion

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Sync Notion content snapshot
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: node scripts/sync-notion-content.mjs
      - name: Publish changed content
        run: |
          if git diff --quiet -- site/content/website-content.json; then
            echo "No content changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/content/website-content.json
          git commit -m "Sync website content from Notion"
          git push
