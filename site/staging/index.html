<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Noah Lucas Site Staging</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #111;
        --muted: #5f6368;
        --line: #d9d9d9;
        --paper: #fff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #f5f5f3;
        color: var(--ink);
        font: 15px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      header {
        align-items: center;
        background: var(--paper);
        border-bottom: 1px solid var(--line);
        display: flex;
        gap: 16px;
        justify-content: space-between;
        padding: 18px 24px;
      }

      h1 {
        font-size: 18px;
        line-height: 1.2;
        margin: 0;
      }

      p {
        color: var(--muted);
        margin: 4px 0 0;
      }

      a {
        color: #064eb5;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .button {
        align-items: center;
        background: var(--ink);
        border: 1px solid var(--ink);
        border-radius: 6px;
        color: #fff;
        display: inline-flex;
        font-weight: 600;
        min-height: 36px;
        padding: 8px 12px;
        text-decoration: none;
      }

      .button.secondary {
        background: var(--paper);
        color: var(--ink);
      }

      main {
        padding: 20px;
      }

      .frame {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 16px 40px rgba(17, 17, 17, 0.08);
        height: calc(100vh - 118px);
        min-height: 520px;
        overflow: hidden;
      }

      iframe {
        border: 0;
        display: block;
        height: 100%;
        width: 100%;
      }

      @media (max-width: 760px) {
        header {
          align-items: flex-start;
          flex-direction: column;
          padding: 16px;
        }

        main {
          padding: 12px;
        }

        .frame {
          height: 72vh;
          min-height: 460px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>Staging review: 2026-06-29_homepage_v003</h1>
        <p>Production is not promoted. Live Squarespace has not been modified.</p>
      </div>
      <nav class="actions" aria-label="Staging links">
        <a class="button" href="../releases/2026-06-29_homepage_v003/preview/index.html">Open preview</a>
        <a class="button secondary" href="../releases/2026-06-29_homepage_v003/manifest.json">Manifest</a>
        <a class="button secondary" href="./latest.json">Staging pointer</a>
      </nav>
    </header>
    <main>
      <div class="frame">
        <iframe
          title="Noah Lucas homepage staging preview"
          src="../releases/2026-06-29_homepage_v003/preview/index.html"
        ></iframe>
      </div>
    </main>
  </body>
</html>
